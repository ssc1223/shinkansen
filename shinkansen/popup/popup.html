<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Shinkansen</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1><img src="../icons/icon-128.png" alt="" class="page-title-icon">Shinkansen<span class="update-dot" id="update-dot" hidden title="有新版可下載"></span></h1>
    <span class="version" id="version"></span>
  </header>

  <main>
    <!-- v1.6.5: 剛升級的歡迎條（CWS 自動更新後顯示一次性綠色 banner，使用者按
         「知道了」永久 dismissed）。welcome banner 與 update banner 互斥——
         CWS 使用者只會看到綠色，unpacked 使用者只會看到黃色。 -->
    <div id="welcome-banner" class="welcome-banner" hidden>
      <strong id="welcome-banner-title">🎉 已升級</strong>
      <p class="welcome-banner-subtitle">本版新增：</p>
      <ul id="welcome-bullets" class="welcome-bullets"></ul>
      <button id="welcome-banner-dismiss" class="welcome-banner-dismiss" type="button">知道了</button>
    </div>

    <!-- v1.6.1: 有新版可下載時顯示 banner（v1.6.3 改 button 不依賴 a-tag navigate
         避免 popup 環境下 <a target="_blank"> 反而 navigate 到 popup.html# 的怪 bug） -->
    <button id="update-banner" class="update-banner" type="button" hidden>
      <strong>📦 有新版可下載</strong>
      <span id="update-banner-version"></span>
    </button>

    <button id="translate-btn" class="primary">翻譯本頁</button>
    <button id="edit-btn" class="secondary" hidden>編輯譯文</button>

    <!-- v1.5.0: 顯示模式切換（單語覆蓋 / 雙語對照） -->
    <div class="display-mode-row">
      <span class="display-mode-label">顯示模式</span>
      <div class="display-mode-toggle" role="radiogroup" aria-label="顯示模式">
        <button id="mode-single" class="mode-btn" type="button" role="radio" aria-checked="true">替換原文</button>
        <button id="mode-dual"   class="mode-btn" type="button" role="radio" aria-checked="false">雙語對照</button>
      </div>
    </div>

    <div class="row">
      <label for="auto">自動翻譯指定網站</label>
      <input type="checkbox" id="auto">
    </div>

    <!-- v1.2.12: 只在 YouTube 頁面時顯示 -->
    <div class="row" id="yt-subtitle-row" hidden>
      <label for="yt-subtitle-toggle">YouTube 字幕翻譯</label>
      <input type="checkbox" id="yt-subtitle-toggle">
    </div>

    <!-- commit 5a:只在 Drive 影片 viewer 顯示(drive.google.com/file/) -->
    <div class="row" id="drive-subtitle-row" hidden>
      <label for="drive-subtitle-toggle">Drive 影片字幕翻譯</label>
      <input type="checkbox" id="drive-subtitle-toggle">
    </div>

    <!-- commit 5c:雙語對照 toggle(YouTube 影片 + Drive 影片頁顯示,共用 ytSubtitle.bilingualMode) -->
    <div class="row" id="bilingual-row" hidden>
      <label for="bilingual-toggle">字幕雙語對照</label>
      <input type="checkbox" id="bilingual-toggle">
    </div>

    <div class="row">
      <label for="glossary-toggle">術語表一致化</label>
      <input type="checkbox" id="glossary-toggle">
    </div>

    <div class="cache-row">
      <span id="cache-info" class="cache-info">快取：讀取中…</span>
      <button id="clear-cache-btn" class="link small">清除快取</button>
    </div>

    <div class="cache-row">
      <span id="usage-info" class="cache-info">累計費用：讀取中…</span>
    </div>

    <div id="status" class="status">狀態：就緒</div>
  </main>

  <footer>
    <button id="options-btn" class="link">設定</button>
    <span id="shortcut-hint" class="hint"></span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
