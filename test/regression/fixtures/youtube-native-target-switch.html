<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube native-target-switch fixture</title>
  <meta property="og:title" content="">
  <script>
    // 模擬 content-youtube-main.js(MAIN world)的兩條 bridge:
    //   1) shinkansen-yt-query-player-response:回 captionTracks + activeTrack + videoId
    //   2) shinkansen-yt-set-caption-track:記錄被切的 track 進 window.__setCaptionCalls
    //
    // 各 spec 在啟動翻譯前 page.evaluate 設 window.ytInitialPlayerResponse + window.__activeTrack。

    window.addEventListener('shinkansen-yt-query-player-response', () => {
      let captionTracks = null;
      let playerResponseAvailable = false;
      let videoId = null;
      let activeTrack = null;
      try {
        const resp = window.ytInitialPlayerResponse;
        playerResponseAvailable = !!resp;
        videoId = (resp && resp.videoDetails && resp.videoDetails.videoId) || null;
        const tracks = resp
          && resp.captions
          && resp.captions.playerCaptionsTracklistRenderer
          && resp.captions.playerCaptionsTracklistRenderer.captionTracks;
        if (Array.isArray(tracks)) {
          captionTracks = tracks.map(function (t) {
            return {
              languageCode: (t && t.languageCode) || null,
              kind: (t && t.kind) || '',
            };
          });
        }
        if (window.__activeTrack) {
          activeTrack = {
            languageCode: window.__activeTrack.languageCode || null,
            kind: window.__activeTrack.kind || '',
            translationLanguageCode: window.__activeTrack.translationLanguageCode || null,
          };
        }
      } catch (_) { /* keep nulls */ }
      window.dispatchEvent(new CustomEvent('shinkansen-yt-player-response', {
        detail: { captionTracks, playerResponseAvailable, videoId, activeTrack },
      }));
    });

    window.__setCaptionCalls = [];
    window.addEventListener('shinkansen-yt-set-caption-track', (e) => {
      const { languageCode, kind } = (e && e.detail) || {};
      window.__setCaptionCalls.push({ languageCode, kind, t: Date.now() });
      window.dispatchEvent(new CustomEvent('shinkansen-yt-set-caption-track-result', {
        detail: { ok: true, error: null },
      }));
    });
  </script>
</head>
<body>
  <div class="html5-video-player" id="movie_player">
    <button class="ytp-subtitles-button" aria-pressed="false">CC</button>
    <div class="ytp-caption-window-container"></div>
    <video></video>
  </div>
</body>
</html>
