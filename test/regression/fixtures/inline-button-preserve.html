<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>fixture: inline-button-preserve(段落內 inline button 翻譯後必須保留)</title>
</head>
<body>
  <!--
    對應「Medium 留言區『more』展開按鈕,翻譯後失去連結 / 樣式」bug。
    使用者回報:Medium 留言 truncated preview 末端的 `<button>more</button>`
    翻譯後變純文字「更多」,連視覺 underline / class 都消失。

    結構特徵(通用,不綁站名):
      - 段落 `<div>`/`<p>` 內含 inline `<button class="...">short label</button>`
      - 來源:Medium 留言 read-more、X(Twitter)推文展開、論壇截斷 preview 等。
        SPA 框架(React/Vue)用 button 配 onClick 做 client-side 展開,不上 `<a href>`。

    bug:
      content-ns.js 把 BUTTON 列為 HARD_EXCLUDE_TAGS(原意防 form 控制項被翻),
      content-serialize.js walker 進到 inline button 就 continue,連 wrapper 帶
      文字一起被丟。譯文裡的「更多」其實是 LLM 從前文 ellipsis context 補譯出來,
      跟 button 結構無關。

    修法:
      content-ns.js `PRESERVE_INLINE_TAGS` 加 BUTTON,serialize walker 對 inline
      button 加 paired placeholder ⟦N⟧content⟦/N⟧(類似 inline `<a>` 的 path)。
      Walker 入口的 HARD_EXCLUDE 仍擋以 button 為主的 widget(detect 階段
      isInteractiveWidgetContainer 不變),只在「button 嵌在 prose 段落內」開洞。

    斷言(基於結構特徵):
      1. serializer 輸出文字含配對標記 ⟦N⟧ / ⟦/N⟧,代表 button 被當成 paired slot
      2. 注入譯文後 DOM 內仍有 `<button>` 元素 + class 保留
      3. button 內文已翻譯(「more」→「更多」)
      4. 父段落本體也正常翻成中文(控制組:inline preserve 不影響整段翻譯)
  -->

  <article>
    <p id="control">I don't believe any balloon flight had anything to do with the laying of lines or the figures. That would require constant communication between aloft and the ground.</p>

    <p id="with-button">Could… <button class="medium-more eb ab ac fh">more</button></p>
  </article>
</body>
</html>
