<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-a3-inline-opaque</title>
</head>
<body>
  <!--
    Layer A3 inline opaque fallback regression。

    結構特徵:framework-managed element 內含 preservable inline A,A 裡面又含
    「extractA3Seq 視為 inline 但 serializer 不視為 preservable」的尾部 SPAN
    (cls 有但內容無 alphanum/CJK chars,例 ellipsis "…")。

    對應真實 X 推文 tweetText 結構(Chrome for Claude 2026-05-20 probe 確認):
      tweetText > A.url > [SPAN.head(https://), text(domain), SPAN.tail(…)]
    SPAN.tail 內容 "…" 跨不過 hasSubstantiveContent 的 [A-Za-z...] 閾值,
    serializer 把它當透明 container 拍扁進父 A 的文字,但 extractA3Seq 只看
    「SPAN + hasClass」就視為 inline。兩邊判斷不對齊 → A3 alignment 失敗。

    驗:
      - extractA3Seq source A 抽出 3 items [inline, text, inline]
      - deserialize target A 抽出 2 items [inline, text] (尾部 SPAN 沒 slot,
        以 text "…" 還原)
      - 修法後 collectA3Mutations 在 A 內遞迴 length 不符時 return false,
        但外層不放棄 — 視 A 為 opaque(內部不 mutate,保 source 原樣)
      - 外層 SPAN.prefix 仍照常 mutate → 達成「視覺 single 原地替換」+
        「framework DOM ref(尤其 A click handler)完整保留」
      - 不應 inject sibling <shinkansen-translation> wrapper(§15 single 規範)
  -->
  <article>
    <div id="target" data-testid="tweetText" lang="en"><span class="text-prefix">Hello world </span><a class="url-link" href="https://example.com/path"><span class="url-head">https://</span>example.com/path<span class="url-tail">…</span></a></div>
  </article>
</body>
</html>
