<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><title>nav-li-anchor-role-button</title></head>
<body>
  <!-- 抽自 upmedia.mg(swiper carousel)的最小重現結構 -->
  <header id="header" class="header">
    <div class="logobox container">
      <ul class="nav nav-pills">
        <div class="swiper swiper-nav">
          <div class="swiper-wrapper">
            <div role="group" class="swiper-slide swiper-slide-active">
              <li id="nav-real-link"><a href="/tw/project/project-0039" role="button">美伊開戰</a></li>
            </div>
            <div role="group" class="swiper-slide">
              <li id="nav-also-real-link"><a href="/tw/category/latest" role="button">最新</a></li>
            </div>
          </div>
        </div>
      </ul>
    </div>
  </header>

  <!-- 對照組:真 widget(SPA dropdown trigger,href="#" + role="button")應仍被 widget skip -->
  <nav>
    <li id="nav-fake-button-hash"><a href="#" role="button">展開選單</a></li>
    <li id="nav-fake-button-js"><a href="javascript:void(0)" role="button">折疊</a></li>
    <li id="nav-fake-button-empty"><a role="button">無 href</a></li>
  </nav>

  <!-- 對照組:正常文章段落(確保 walker 仍跑) -->
  <article>
    <p id="control-article">這是一段對照用的內文,確保 walker 在此 fixture 上正常工作,長度應 > 20 字元</p>
  </article>
</body>
</html>
