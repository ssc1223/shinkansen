<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>heading-with-hero-image fixture (v1.5.7)</title>
</head>
<body>
  <!--
    Fixture：WordPress 主題（如 nippper.com）把 hero 封面圖塞進 <h1> 內，
    跟 <div><span>標題文字</span></div> 並列為 H1 直屬子節點。

    結構：
      <h1>
        <img wp-post-image>     ← H1 直屬媒體
        <div><span>標題文字</span></div>  ← H1 直屬 CONTAINER 子容器
      </h1>

    Bug（v1.4.20–v1.5.6）：mediaCardSkip 規則命中
      （querySelector('img,picture,video') && children.some(CONTAINER_TAG)）
    → 整個 H1 被 FILTER_SKIP，從未進翻譯流程，標題保持日文。

    Fix（v1.5.7）：mediaCardSkip 排除 H1–H6
      （HTML5 語意上 heading 不可能是附件卡片，屬結構性通則）。
  -->
  <article class="article_body">
    <h1 class="article_ttl">
      <img width="1600" height="900" src="https://example.com/cover.jpg"
           class="attachment-post-thumbnail size-post-thumbnail wp-post-image" alt="">
      <div>
        <span>近藤版ギラ・ドーガの迷彩に撃たれて、タミヤ パンターG型を買った日。——「かっこいい」は連鎖する</span>
      </div>
    </h1>
    <p id="body-1">In the magazine I held was Tamiya 1/48 German V Panther G.</p>
    <p id="body-2">It was a beautiful build.</p>
  </article>
</body>
</html>
