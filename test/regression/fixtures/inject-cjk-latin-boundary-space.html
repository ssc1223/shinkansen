<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-cjk-latin-boundary-space</title>
</head>
<body>
  <!--
    CJK-Latin 邊界自動補空格:LLM 重組句子時把 inline placeholder 周邊的空白吃掉,
    導致 CJK 結尾 SPAN 直接接 Latin 開頭 A.url,中間沒 space。

    對應真實 X 推文 (@9to5mac 2026-05-20 probe):
      原文「...Italy rights ⟦1⟧https://9to5mac.com/...⟦/1⟧」(rights 後有 trailing space)
      LLM 譯成「...轉播權⟦1⟧https://...⟦/1⟧」(LLM 重組句序時 trailing space 丟失)
      deserialize 後可見:「轉播權https://...」(無 space, image #6)

    修法:parseSegment 在 append slot element 進 frag 之前,查 frag tail 結尾若是
    CJK 且 slot textContent 開頭是 Latin → 給 tail 的 trailing text node 補一個 space。

    驗:source SPAN 內 "...rights " text 經 mutate 後應為 "...轉播權 "(trailing space
    保留),A.url 接 SPAN[1] 中間有 space。
  -->
  <article>
    <div id="target" data-testid="tweetText" lang="en" style="white-space: pre-wrap;"><span class="prefix">Apple global F1 ambitions hit roadblock as Sky extends U.K. and Italy rights </span><a class="url" href="https://9to5mac.com/path">https://9to5mac.com/path</a></div>
  </article>
</body>
</html>
