<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: spa-detach-reattach reapply</title>
</head>
<body>
  <!--
    對應「框架把譯後 element 整個 detach 換新 element」的 root cause
    (真實案例:YouTube watch metadata 的 yt-attributed-string 在 model 更新時
    把整個 host span 取代成新的英文 host span)。

    結構特徵(通則,不綁站名):
      - 父容器持續 connected
      - 父容器內某個曾被翻譯的 child element 整個被 removeChild + 新 child 用 appendChild 換上
      - 新 child 的 textContent.trim() 等於原文

    為什麼 Content Guard 預設認不出:
      - guard 走 STATE.translatedHTML.keys() 比對 innerHTML
      - 舊 key !el.isConnected → guard 直接 continue
      - 新 element 不在 STATE.translatedHTML → guard 完全認不出
      → 譯文永久消失。

    修法:onSpaObserverMutations 入口加 reapplyOnDetachReattach,事件驅動掃 mutation
      的 removedNodes vs addedNodes,用 STATE.originalText snapshot 比對找回新 element,
      reapply 譯文 + 把 STATE 的 key 從舊 element 轉到新 element。
  -->
  <article>
    <div id="parent">
      <p id="target">The quick brown fox jumps over the lazy dog near the riverbank on a sunny afternoon</p>
    </div>
  </article>
</body>
</html>
