<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>detect-media-card-skip-with-text fixture</title>
</head>
<body>
  <!--
    Fixture: detect-media-card-skip-with-text
    結構特徵:P 內含「實質文字 + 內嵌廣告卡片(內含 img + nested container)」。
    真實案例:eet-china.com 文章內 P 結構
      P > text("具体而言...") + B*5 + text("，该集群为...实现部署。") + DIV.partner-content
      其中 partner-content > [partner-title > A, partner-list > row > col-lg-4 > img + title]
    原 mediaCardSkip(content-detect.js v1.5.7)條件:
      (1) not H1-6 (2) querySelector img/picture/video (3) some child is CONTAINER_TAGS
    P 三條全命中 → FILTER_SKIP → 整段 P 文字永遠不翻,使用者只看到 SC 原文。
    修法 v1.9.15:加第 4 條 directTextLength < 20 例外。directTextLength 是 el 直屬
    text node 文字長度總和。P 有 200+ chars 直屬文字 → 跳過 mediaCardSkip → P 走
    element 路徑正常 serialize + 翻譯。
    既有 case 保護:LI > A.file-preview + DIV.file-content 結構,LI 直屬無 text node
    (file-preview / file-content 都是 element child),directTextLength=0 仍命中
    mediaCardSkip,讓 walker 進去找葉節點(舊行為不變)。

    斷言預期:
      1. eet-china-style P 內含文字+B+text+ad-div → 應 collected as element
      2. LI 附件卡片(無直屬文字)→ 應仍 mediaCardSkip(integer skip)
  -->
  <div id="target">
    <!--
      Case 1:eet-china 風格 P。直屬有 text node + B + text node + 廣告 DIV(含 img)。
      在 v1.9.15 之前會被 mediaCardSkip 誤殺。修法後應 collected。
    -->
    <p id="article-p-with-inline-ad">具体而言，2026年3月，摩尔线程签订了<b>6.6亿元的夸</b><b>娥</b><b>（KUAE）</b><b>智算集群</b><b>大单</b>，该集群为万卡训练智算集群，成功攻克了万卡级硬件系统优化等系列高难度工程壁垒，可实现万亿参数大模型端到端训练。<span class="ad-marker-placeholder"></span></p>

    <!--
      Case 2:對照組 — LI 附件卡片。LI 直屬無 text node,只有 A 跟 DIV 兩個 element children。
      應仍命中 mediaCardSkip(directTextLength=0)。
    -->
    <ul>
      <li id="attachment-card">
        <a class="file-preview"><img src="data:image/png;base64,iVBORw0KGgo=" alt="thumb" width="50" height="50"></a>
        <div class="file-content">
          <span class="file-name">附件檔名.pdf</span>
        </div>
      </li>
    </ul>
  </div>

  <script>
    // 動態注入廣告 DIV 到 Case 1 的 P 內(模擬真實 eet-china 頁面 JS 注入,
    // 繞過 HTML5 parser 對 P>DIV auto-close 的處理)
    const adDiv = document.createElement('div');
    adDiv.className = 'partner-content-article';
    adDiv.innerHTML = `
      <div class="partner-title">
        <a href="#more" class="the-text">合作内容 更多 ></a>
      </div>
      <div class="partner-list">
        <div class="row">
          <div class="col-lg-4">
            <img src="data:image/png;base64,iVBORw0KGgo=" alt="ad" width="100" height="50">
            <div class="title">广告卡片标题</div>
          </div>
        </div>
      </div>
    `;
    document.getElementById('article-p-with-inline-ad').replaceChild(
      adDiv,
      document.querySelector('.ad-marker-placeholder')
    );
  </script>
</body>
</html>
