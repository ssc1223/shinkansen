<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>inject-lazy-media-placeholder fixture</title>
</head>
<body>
  <!--
    Fixture: inject-lazy-media-placeholder
    結構特徵: <a> 含「lazy-loaded media placeholder DIV(有 children 但無 text)+ title DIV」
    對應 X(Twitter)URL card preview 結構:
      <a href="..."><div(empty image placeholder)><div></div><div></div></div><div>(title text)</div></a>
    SPA framework 把圖片 lazy-load 進去前,placeholder DIV 是空殼(有 children 維持 layout 但無文字)。

    Bug(修法前):
      injectIntoTarget 看到 containsMedia(target)=false(IMG 還沒 lazy-load 進來),
      預設走 (A) clean-slate 把 target 所有 children 清掉,只留翻完的 title text。
      之後 SPA 想 lazy-load 圖片進 placeholder DIV 找不到容器 → 大圖預覽永遠不顯示。

    修法:
      injectIntoTarget 加 hasEmptyPlaceholderChild 偵測,加進 (B) 守門
      (containsMedia OR hasEmptyPlaceholderChild)→ 走 (B) media-preserving 路徑,
      保住 placeholder DIV,只替換 title 文字。
  -->
  <a id="target" href="https://example.com/article">
    <div class="img-placeholder"><div></div><div></div></div><div class="title">Does iPhone need its own MacBook Neo moment? - 9to5Mac</div>
  </a>
</body>
</html>
