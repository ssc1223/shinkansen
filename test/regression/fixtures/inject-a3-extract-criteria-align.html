<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-a3-extract-criteria-align</title>
</head>
<body>
  <!--
    extractA3Seq 對齊 serializer isPreservableInline 的 hasSubstantiveContent 檢查。

    結構特徵:tweetText 內含「class 在身但無 alphanum/CJK 實質內容」的 SPAN
    (例 SPAN(" ") 空白 spacer)。serializer 視為透明、拆扁文字進兄弟層;
    deserialize 後 target 該位置是 text node;舊 extractA3Seq 只看「SPAN+class」
    視為 inline → source seq 帶 inline、target seq 是 text、type 不符 alignment fail
    → fallback dual sibling(違反 §15)。

    對應真實 X 推文(Chrome for Claude 2026-05-20 probe @YoinkApp 確認):
      tweetText > [SPAN("hashtag wrap"), SPAN(" "), A.url, SPAN("\n\nEnjoy"), ...]
    多個 SPAN(" ") 跟 SPAN.r-18u37iz hashtag wrapper 並列。

    驗:
      - source 3 個 SPAN spacer(都 has class、都僅含 " ")原 extractA3Seq 視為 inline
      - target 那 3 個位置 deserialize 還原成裸 text node
      - 修法後 extractA3Seq 改呼叫 SK.isPreservableInline,跟 serializer 完全對齊,
        non-substantive SPAN 視為透明遞迴 → source seq[i] 也變 text → 跟 target 對齊
      - 走 nodeValue mutate path、A 與 hashtag-wrap SPAN ref 保留、不 fallback dual
  -->
  <article>
    <div id="target" data-testid="tweetText" lang="en"><span class="prefix">Yoink for </span><span class="hashtag-wrap"><a class="hashtag-link" href="/hashtag/iPhone">#iPhone</a></span><span class="spacer"> </span><a class="url" href="https://example.com/path">https://example.com/path</a><span class="spacer"> </span><span class="hashtag-wrap"><a class="hashtag-link" href="/hashtag/ios">#ios</a></span></div>
  </article>
</body>
</html>
