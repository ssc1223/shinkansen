<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>detect-lang-simp-coverage fixture</title>
</head>
<body>
  <!--
    Fixture: detect-lang-simp-coverage
    結構特徵:短 zh-CN 段落含「曾經被原 SIMPLIFIED_ONLY_CHARS set 漏掉的常見字」。
    真實案例:X 引用文章卡片標題
      "手冲咖啡进阶指北：冠军参数如何变成你的日常 - 少数派"
    23 個 CJK 內含 8 個簡中字(冲 进 阶 军 参 数 变 数),但 8 字裡只有「进数变数」4 字
    在原 set;簡中佔比 4/23 ≈ 0.17 < 0.2 → detectTextLang 誤判 zh-Hant → target=zh-TW
    時 isAlreadyInTarget 回 true → isCandidateText 回 false → 整段被當「已是繁中」跳過。
    結果:簡中卡片標題永遠不送翻,使用者看到 untranslated 簡中。

    修法:補上 冲 阶 军 参 個 國 等常見高頻簡中字到 SIMPLIFIED_ONLY_CHARS,讓 ratio 過閾值。
  -->
  <div id="target">
    <!-- 短簡中含 4 個漏掉的字(冲 阶 军 参)— 補字前 set 命中率不夠跨閾值 -->
    <p id="short-simp-missed-chars">手冲咖啡进阶指北：冠军参数如何变成你的日常 - 少数派</p>

    <!-- 對照組:短繁中,應仍維持 zh-Hant skip -->
    <p id="short-trad">手沖咖啡進階指北:冠軍參數如何變成你的日常 - 少數派</p>

    <!-- 對照組:短英文,應 collected -->
    <p id="short-en">Pour-over coffee guide: turning championship recipes into daily routine</p>
  </div>
</body>
</html>
