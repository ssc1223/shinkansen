<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: inject-a3-br-edge</title>
</head>
<body>
  <!--
    Layer A3 BR-at-edge case:source 是「\n\nText\n\n」單一 text node(\n 在首尾),
    target deserialize 後是「BR BR text BR BR」(BR 在 container 邊緣)。

    結構特徵:source SPAN 內單一 text node 含「\n\nEnjoy : )\n\n」,parent DIV
    白名單 white-space:pre-wrap 讓 serializer preserveNewlines。
    deserialize 階段 pushText 對開頭 "" 不加 text 但仍加 BR、結尾同理 → BR 在邊緣。
    舊 special case 條件 targetSeq.length > 1 不過(BR drop 後僅剩 1 text)→ 走 normal
    flow → 把 source "\n\nEnjoy : )\n\n" mutate 成「結束 : )」漏掉 \n\n →
    X tweet 段落間 visual blank line 全壞。

    對應真實 X 推文 (@YoinkApp 2026-05-20 probe):
      tweetText > SPAN("\n\nEnjoy : )\n\n")
      → deserialize 後 [BR, BR, text, BR, BR]

    驗:
      - 修法後 targetContainerHasBr() 查 container 本身的 BR(不靠 seq.length)
      - source 含 \n 且 target container 有 BR → 走 targetContainerToText 還原 \n
      - source text node mutate 成「\n\n結束 : )\n\n」(\n 保留)
      - 視覺上段落間 blank line 完整顯示
  -->
  <article>
    <div id="target" data-testid="tweetText" lang="en" style="white-space: pre-wrap;"><span class="prefix">Hello </span><span class="tail">

End : )

</span></div>
  </article>
</body>
</html>
