<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>inject-img-between-text-spans fixture</title>
</head>
<body>
  <!--
    Fixture: inject-img-between-text-spans
    結構特徵: target DIV 含「IMG 把兩個 text-bearing inline SPAN 切開」的結構。
    對應 X(Twitter) 推文 body 結構:tweetText DIV 內 <span>intro</span><img alt="emoji"><span>rest</span>。

    Bug(修法前):
      injectIntoTarget 看到 containsMedia(target)=true、!hasContainerChild、!isHeading,
      走 (B) media-preserving。findLongestTextNode 挑到 SPAN[1] 的 text node 為 main,
      其他 text node(SPAN[0] 內)被清空,walk-up 邏輯把 SPAN[0] 整顆當空殼移除。
      譯文 fragment 被插進 main.parentNode(SPAN[1]),target 變成 [IMG_orig, SPAN[1]],
      SPAN[0] 消失 → 譯文掉一大段。

    修法:
      injectIntoTarget 加 textBearingChildCount > 1 的守門,跳過 (B) 走 (A) clean-slate。
      Clean-slate 把 target 子元素清掉,append 整個 deserialized fragment(含 SPAN+IMG+SPAN),
      結構完整保留。
  -->
  <div id="target"><span class="text-region">Intro paragraph here.</span><img alt="🤯" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><span class="text-region">Rest paragraph that is intentionally much longer than the intro to ensure findLongestTextNode picks this one as main, reproducing the X tweet bug where the front span is dropped.</span></div>
</body>
</html>
