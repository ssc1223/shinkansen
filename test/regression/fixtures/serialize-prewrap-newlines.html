<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Serialize pre-wrap newlines fixture</title>
</head>
<body>
<!-- 模擬 Twitter / Reddit / Threads 等用 SPAN + textContent \n + white-space: pre-wrap 顯示換行 -->
<article id="prewrap-tweet" style="white-space: pre-wrap; display: block;">
<span>First line of tweet
Second line of tweet
Third line of tweet</span>
</article>

<!-- 控制組:white-space normal,textNode \n 應被 collapse(原行為) -->
<article id="normal-tweet" style="white-space: normal;">
<span>Single line content
with embedded newline that should be collapsed</span>
</article>

<!-- 含 BR 的傳統結構,確認 BR 路徑沒被破壞 -->
<article id="br-tweet">
<span>Line A</span><br><span>Line B</span><br><span>Line C</span>
</article>
</body>
</html>
