<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>leaf-div-prominent-heading</title>
  <style>
    /* 仿真 upmedia.mg 上 sel-tit2 class 視覺(48px 大字 section title)*/
    .prominent-heading { font-size: 48px; display: block; }
    .medium-heading { font-size: 24px; display: block; }
    .below-threshold { font-size: 20px; display: block; }
    .inline-author { font-size: 18px; display: inline; }
    .inline-author-block { font-size: 18px; display: block; }
    .timestamp { font-size: 14px; display: block; }
  </style>
</head>
<body>
  <!--
    抽自 upmedia.mg 真實 DOM(2026-05-08 probe-upmedia-section-title.js dump):
      <div class="sel-tit2 clearfix">編輯部推薦</div>
    DIV(非 H1-H6)+ 5 字短中文 + 48px 大字 + display:block + 無 element children
    → 走 leaf DIV/SPAN 補抓 path 但被 textLen < 20 reject。

    v1.8.61 修法:< 20 字的 leaf DIV/SPAN 必須 display 為 block 系列 + font-size
    >= 24px 才放行(visual prominent heading 通則)。
  -->

  <!-- 主斷言:48px / block / 5 字 → 應被收(對應「編輯部推薦」)-->
  <div id="prominent-48px" class="prominent-heading">編輯部推薦</div>

  <!-- 邊界斷言:24px / block / 短字 → 應被收(剛好閾值)-->
  <div id="medium-24px" class="medium-heading">焦點</div>

  <!-- 對照組 1:20px / block / 短字 → 不被收(低於 24px 閾值)-->
  <div id="below-threshold" class="below-threshold">快訊</div>

  <!-- 對照組 2:18px / inline span → 不被收(非 block,排除 author 雜訊)-->
  <span id="inline-author" class="inline-author">王小明</span>

  <!-- 對照組 3:18px / display:block 但 font-size < 24 → 不被收 -->
  <div id="inline-author-block" class="inline-author-block">張記者</div>

  <!-- 對照組 4:14px timestamp / block → 不被收 -->
  <div id="timestamp" class="timestamp">2026-05-08 11:25</div>

  <!-- 對照組 5:既有行為,>= 20 字長段不受新邏輯影響 -->
  <div id="long-content" style="font-size:14px;">這是一段對照用的長內文,確保 v1.8.61 改動不影響既有 leaf DIV 補抓路徑,長度 > 20 字</div>

  <!-- walker 主路徑控制組(P 段)-->
  <article>
    <p id="control-article">這是一段對照用的內文,確保 walker 在此 fixture 上正常工作,長度應 > 20 字元</p>
  </article>
</body>
</html>
