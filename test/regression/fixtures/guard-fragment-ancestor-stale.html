<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: guard-fragment-ancestor-stale</title>
</head>
<body>
  <!--
    對應 v1.8.x — Content Guard 父層 savedHTML 過時導致子層譯文被覆蓋回原文 bug。

    結構通則 (不綁 vBulletin / forum.miata.net):
      block-like container（DIV，非 BLOCK_TAGS_SET）同時擁有：
        (a) 自己的直屬 inline 文字 + BR（會被 collectParagraphs 抓成 fragment unit）
        (b) 巢狀 BLOCK_TAGS_SET 子段落（會被另外抓成獨立 element unit）

    Bug 觸發條件:
      1. fragment unit 先 inject → STATE.translatedHTML.set(outer, innerHTML) 凍結，
         此時 inner BLOCK 子段落還沒 inject、savedHTML 含子層原英文。
      2. inner element unit 後 inject → DOM 上 inner 變中文，但 outer 的 savedHTML
         沒同步更新。
      3. Content Guard sweep 看 outer.innerHTML !== savedHTML → 強制 el.innerHTML = savedHTML，
         整個 outer 被覆寫，inner 中文被打回 stale 英文，原 inner element detach 變孤兒。

    真實案例: forum.miata.net showpost — postbitcontrol2 (DIV) 同時含主貼文 inline
      文字 + BR + 子層 DIV.bbcodestyle > TABLE > TR > TD > DIV (引用區塊)。

    斷言:
      - inject 兩段後 inner 是中文
      - 跑 testRunContentGuard() 後 inner 仍是中文（不被 outer stale savedHTML 覆寫回英文）
  -->
  <div id="outer">
    <p id="inner-elem">Inner element content here for testing of the translation</p>
    Outer fragment alpha here for testing<br>
    Outer fragment beta here for testing<br>
    Outer fragment gamma here for testing
  </div>
</body>
</html>
