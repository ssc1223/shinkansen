<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-a3-google-drops-connector</title></head>
<body>
  <!--
    對應 v1.9.31 segment fallback「Google MT 把短 metadata 連接詞合進主文」case。

    結構特徵(不綁站名):
      src tweetText 結構:[SPAN.main + A.url + SPAN(" by ") + DIV(SPAN(A.mention))]
      Google MT 翻譯時把 " by " 跟前段主文一起翻譯,中文版去掉「by」(中文不需要這個連接詞)。
      deserialize 後 tgt 結構:[text(中文主文), A.url, A.mention] — 中間 " by " segment 消失。

      strict / SPAN-unwrap 對齊 src 4 items vs tgt 3 items 長度不符。
      segment fallback 對「src text segment 有內容 + tgt text segment 空」case 容忍
      mutate src text 為 "",前提是 src text 總長 ≤ 12 字(避免實質 prose 被丟掉)。

    模擬真實 X 推文「@9to5toys iPad Air 」結構(2026-05-20 Chrome for Claude probe):
      <div data-testid="tweetText">
        <span class="...">Now even lower: Giant $400 price drop hits this 1TB M3 iPad Air today </span>
        <a class="..." href="t.co/...">URL anchor(含 SPAN 多子)</a>
        <span class="..."> by </span>
        <div><span><a href="/user/">@justinkahnmusic</a></span></div>
      </div>

    斷言:
      - 走 nodeValue mutate(不 fallback dual)
      - 沒 SHINKANSEN-TRANSLATION sibling wrapper
      - 主 SPAN.main text 已翻譯成中文
      - " by " text 被 mutate 為 ""(視覺上失去 by,接受 Google MT 翻譯結果)
      - A.url 跟 A.mention 結構保留
  -->
  <div id="tweet" data-testid="tweetText">
    <span class="text-main">Now even lower: Giant $400 price drop hits this 1TB M3 iPad Air today </span>
    <a class="url-link" href="https://example.com/article"><span class="url-frag-1">https://</span>example.com/<span class="url-frag-2">2026/05/20/giant-deal/</span><span class="url-frag-3">…</span></a>
    <span class="by-connector"> by </span>
    <div class="mention-wrap"><span class="mention-inner"><a class="mention-anchor" href="/user/">@justinkahnmusic</a></span></div>
  </div>
</body>
</html>
