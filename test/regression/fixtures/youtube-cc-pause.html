<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube CC pause fixture</title>
</head>
<body>
  <!-- Fixture: 使用者按 CC 關閉 → ccPaused=true,onVideoTimeUpdate / RateChange / Seeked
       一律 return,不再送 TRANSLATE_SUBTITLE_BATCH。CC 重開 → ccPaused=false,
       重設 translatedUpToMs 並立刻續翻當前 currentTime 對應的視窗。

       初始 aria-pressed=true(CC 開著),spec 端會切換驗證。 -->
  <div class="html5-video-player">
    <button class="ytp-subtitles-button" aria-pressed="true">CC</button>
    <div class="ytp-caption-window-container"></div>
    <video></video>
  </div>
</body>
</html>
