<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-a3-newline-segment</title></head>
<body>
  <!--
    對應 v1.9.31 \n-aware segment fallback bug:Google MT + framework 段落 + source
    含 \n 換行的推文(典型 X tweet user 按 Enter 換行)出現 dual sibling wrapper。

    結構特徵(不綁站名):
      source 端 SPAN.main 內 text node 含 `\n` char(white-space: pre-wrap render
      出視覺換行)。Google MT serializer 對 SPAN 透明 + preserveNewlines=true 把
      \n 送進 Google API,翻完保留 \n,deserialize 時 \n 拆成 BR + text。target
      SpanU 比 src 多出 BR-split text → strict / SPAN-unwrap 等長都對不上 → 原本
      fallback dual sibling wrapper(違反 §15 single 原地替換)。

      修法:加 segment-based fallback,以 inline 為錨點分段對齊,區段內 1-to-N
      text 用 \n join 起來 mutate(保留 src 原 leading/trailing \n 結構)。

    模擬真實 X 推文「@asymco Mont Blanc / Exotica」結構(2026-05-20 Chrome for Claude
    真實 dump):
      <div data-testid="tweetText">
        <span class="...">主文 prose\nMont Blanc </span>        ← SPAN 內含 \n
        <a class="..." href="t.co/...">URL1 anchor(含 SPAN 多子)</a>
        <span class="...">\nExotica </span>                     ← SPAN 內含 \n
        <a class="..." href="t.co/...">URL2 anchor</a>
        <span class="...">\n\n</span>                           ← 空段落
        <span><a href="/hashtag/">#tag1</a></span>
        <span> </span>
        <span><a href="/hashtag/">#tag2</a></span>
      </div>

    斷言:
      - 走 nodeValue mutate(不 fallback dual)
      - 沒 SHINKANSEN-TRANSLATION sibling wrapper
      - 主 SPAN.main text 內 \n 保留,主文 + Mont Blanc 翻譯用 \n 接起
      - SPAN.exotica text mutate 為「\n + Exotica 翻譯」(leading \n 保留)
      - A.url1 / A.url2 內部結構完整保留
  -->
  <div id="tweet" data-testid="tweetText" style="white-space: pre-wrap;">
    <span class="text-main">My latest Italo Disco sets for the Mind Enterprises fans out there. Check out on Mixcloud:
Mont Blanc </span>
    <a class="url-link-1" href="https://example.com/mont-blanc"><span class="url-frag-a1">https://</span>example.com/<span class="url-frag-a2">mont-blanc/</span><span class="url-frag-a3">…</span></a>
    <span class="exotica-spacer">
Exotica </span>
    <a class="url-link-2" href="https://example.com/exotica"><span class="url-frag-b1">https://</span>example.com/exotica/</a>
    <span class="hashtag-spacer">

</span>
    <span class="hashtag-wrap-1"><a class="hashtag-anchor-1" href="/hashtag/italodisco/">#italodisco</a></span>
    <span class="hashtag-spacer-mid"> </span>
    <span class="hashtag-wrap-2"><a class="hashtag-anchor-2" href="/hashtag/mindenterprises/">#mindenterprises</a></span>
  </div>
</body>
</html>
