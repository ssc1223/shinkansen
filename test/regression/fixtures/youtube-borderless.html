<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>YouTube borderless mode test</title></head>
<body>
  <div id="page-loaded-sentinel">ready</div>
  <ytd-app>
    <div id="masthead-container">masthead</div>
    <ytd-masthead>masthead 2</ytd-masthead>
    <ytd-page-manager>
      <ytd-watch-flexy>
        <div id="primary">
          <div id="primary-inner">
            <div id="full-bleed-container" style="height:0">
              <div id="player-container-outer">
                <div id="player-container">
                  <div id="player-container-inner">
                    <div id="movie_player" class="html5-video-player">
                      <div class="html5-video-container">
                        <video class="html5-main-video"></video>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <ytd-watch-metadata>title / channel / actions</ytd-watch-metadata>
            <div id="below">below area</div>
            <div id="comments">comments</div>
          </div>
        </div>
        <div id="secondary">
          <div id="secondary-inner">
            <div id="related">related videos</div>
          </div>
        </div>
      </ytd-watch-flexy>
    </ytd-page-manager>
  </ytd-app>
</body>
</html>
