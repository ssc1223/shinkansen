  <!--
    寬容對齊:LLM 重組句子時把原 placeholder 內文字搬到 placeholder 之間自由 text 區。
    對應真實案例(@jsnell 2026-05-20 + Gemini Flash Lite):
      source 結構:[SPAN("by"), DIV>SPAN.hashtag>A, SPAN("middle"), A.url]
      Flash Lite 譯文把「撰寫的」放到 placeholder 1 跟 3 之間自由 text 區
      deserialize 後:[SPAN, SPAN.hashtag, text(" 撰寫的"), SPAN, A.url]
      → target length 5 vs source length 4(extractA3Seq) → 原本 alignment fail
      → 寬容版把 free text 吸收進下一個 inline leading,合進 SPAN.middle 譯文

    Flash 模型較大,placeholder 守得住,通常沒這問題;Flash Lite 重組時更激進。
  -->
  <article>
    <div id="target" data-testid="tweetText" lang="en"><span class="prefix">Steve Jobs in Exile by </span><div class="css-175oi2r r-xoduu5"><span class="r-18u37iz"><a class="mention" href="/geoffrey_cain">@geoffrey_cain</a></span></div><span class="middle"> is out today. I talked to him on Upgrade: </span><a class="url" href="https://relay.fm/upgrade/616">https://relay.fm/upgrade/616</a></div>
