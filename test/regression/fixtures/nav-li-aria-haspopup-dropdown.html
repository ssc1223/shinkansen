<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>nav-li-aria-haspopup-dropdown</title>
  <style>
    /* 仿真 Bootstrap 預設:`.dropdown-menu` 平常 display:none,LI 加 .show class
       (或 hover)時才 display:block。沒這條 CSS 的話 fixture 中子 anchor 一直
       visible,collectParagraphs 走「子 dropdown-item 各自收」path,測不到「LI
       整顆被收 → inject 破壞嵌套結構」這條真實上報網站場景。 */
    .dropdown-menu { display: none; }
    .nav-item.dropdown:hover > .dropdown-menu { display: block; }
  </style>
</head>
<body>
  <!--
    抽自 upmedia.mg 真實主選單結構(2026-05-08 probe-upmedia-dropdown2.js dump):
      <li class="nav-item dropdown">
        <a class="nav-link" href="/tw/international" role="button"
           aria-haspopup="true" aria-expanded="false">國際</a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="/tw/international/headlines" title="時事">時事</a>
          ... (9 條 dropdown-item)
        </div>
      </li>

    v1.8.60 鬆綁讓「<a role=button> 有真實 href」放行,但漏判 aria-haspopup 是
    顯式 dropdown trigger 的標誌 → 整顆 LI 進翻譯流程,inject 後 .dropdown-menu
    結構被破壞,所有子項平鋪展開亂版(德文版翻完截圖 2026-05-08)。

    v1.8.61 修法:`<a role="button">` 即使 href 是真 URL,只要 aria-haspopup
    為 'true' / 'menu' / 'listbox' 等(非 'false' / 缺漏),就視為 popup trigger
    維持 widget skip。
  -->
  <header>
    <ul class="nav nav-pills">
      <li id="dropdown-li-1" class="nav-item dropdown">
        <a class="nav-link" href="/tw/international" role="button"
           aria-haspopup="true" aria-expanded="false">國際</a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="/tw/international/headlines" title="時事">時事</a>
          <a class="dropdown-item" href="/tw/international/military" title="講武堂">講武堂</a>
          <a class="dropdown-item" href="/tw/international/cross-strait-affairs" title="兩岸局勢">兩岸局勢</a>
          <a class="dropdown-item" href="/tw/international/russia-ukraine-war" title="俄烏戰爭">俄烏戰爭</a>
          <a class="dropdown-item" href="/tw/international/middle-east" title="中東烽火">中東烽火</a>
          <a class="dropdown-item" href="/tw/international/americas" title="美國新聞">美國新聞</a>
          <a class="dropdown-item" href="/tw/international/technology-finance" title="科技財經">科技財經</a>
          <a class="dropdown-item" href="/tw/international/kaleidoscope" title="世界萬象">世界萬象</a>
          <a class="dropdown-item" href="/tw/international/insight" title="深度報導">深度報導</a>
        </div>
      </li>
      <li id="dropdown-li-2" class="nav-item dropdown">
        <a class="nav-link" href="/tw/focus" role="button"
           aria-haspopup="true" aria-expanded="false">焦點</a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="/tw/focus/politics" title="政治">政治</a>
          <a class="dropdown-item" href="/tw/focus/society" title="社會">社會</a>
          <a class="dropdown-item" href="/tw/focus/military" title="軍事">軍事</a>
        </div>
      </li>
    </ul>
  </header>

  <!-- 對照組 1:無 aria-haspopup 的純 nav link(v1.8.60 鬆綁應仍生效)-->
  <nav>
    <ul>
      <li id="plain-nav-li"><a href="/tw/about" role="button">關於我們</a></li>
    </ul>
  </nav>

  <!-- 對照組 2:正常文章段落,確保 walker 在此 fixture 上正常工作 -->
  <article>
    <p id="control-article">這是一段對照用的內文,確保 walker 在此 fixture 上正常工作,長度應 > 20 字元</p>
  </article>
</body>
</html>
