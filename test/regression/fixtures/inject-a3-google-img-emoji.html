<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-a3-google-img-emoji</title></head>
<body>
  <!--
    對應 v1.9.31 IMG atomic + extractA3Seq IMG inline atomic + segment fallback
    catch-all 三塊修法。對應「Twitter/X 用 IMG 渲染 emoji + 多 \n 換行 prose」推文場景。

    結構特徵(不綁站名):
      src tweetText 結構:[SPAN.intro, A.mention, SPAN(":\n\n"), IMG.emoji1, SPAN(line1\n),
        IMG.emoji2, SPAN(line2\n), IMG.emoji3, SPAN(line3\n\nclosing)]
      Google MT serializer 原本對 IMG 走透明 walk(沒 children 不加 token)→ IMG 在
      source text 流消失,deserialize 後 tgt 沒 IMG → src/tgt seq IMG 邊界錯位 →
      segment 對齊把 tgt 全集塞 ss[0] → emoji 全跑到段尾。

      修法三塊:
        1. content-serialize.js Google MT serializer:IMG 走 atomic 【*N】 deep clone
        2. content-inject.js extractA3Seq / extractA3SeqSpanUnwrapped:IMG 視為 inline
           atomic({type:'inline', tag:'IMG'}),src/tgt 兩端 IMG 邊界對等出現
        3. content-inject.js segment fallback:catch-all 處理 N-to-M text segment
           (Google MT 拆出 trailing\n 多 1 段 text 之類)

    模擬真實 X 推文「@thomaspaulmann Gemini 3.5 Flash」結構(2026-05-20 Chrome for Claude probe):
      <div data-testid="tweetText">
        <span>Gemini 3.5 Flash is now available in </span>
        <div><span><a>@raycast</a></span></div>
        <span>:&#10;&#10;</span>
        <img src="emoji1.png">
        <span> Better at following instructions&#10;</span>
        <img src="emoji2.png">
        <span> 4x faster than previous models&#10;</span>
        <img src="emoji3.png">
        <span> Sharper multi-modal reasoning&#10;&#10;Enjoy!</span>
      </div>

    斷言:
      - 走 nodeValue mutate(不 fallback dual)
      - 沒 SHINKANSEN-TRANSLATION sibling wrapper
      - 主 SPAN.intro text 翻譯成中文
      - SPAN.line1/2/3 各對應 emoji 後的中文翻譯
      - 3 個 IMG 仍在原位置(emoji 邊界保留)
      - A.mention 結構保留
  -->
  <div id="tweet" data-testid="tweetText" style="white-space: pre-wrap;">
    <span class="intro">Gemini 3.5 Flash is now available in </span><div class="mention-wrap"><span class="mention-inner"><a class="mention-anchor" href="/user/">@raycast</a></span></div><span class="colon-newline">:

</span><img class="emoji-1" src="data:image/svg+xml,%3Csvg/%3E" alt="emoji1"><span class="line-1"> Better at following instructions
</span><img class="emoji-2" src="data:image/svg+xml,%3Csvg/%3E" alt="emoji2"><span class="line-2"> 4x faster than previous models
</span><img class="emoji-3" src="data:image/svg+xml,%3Csvg/%3E" alt="emoji3"><span class="line-3"> Sharper multi-modal reasoning

Enjoy!</span>
  </div>
</body>
</html>
