<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>fixture: inject-a3-google-transparent-span</title></head>
<body>
  <!--
    對應 v1.9.31 修「Google MT + 單語覆蓋 + framework-managed element 結構(X
    tweet「@mention 推文含 URL」)出現雙語 wrapper」bug。

    結構特徵(這才是要鎖死的通則,不綁站名):
      Google MT serializer 對 SPAN 一律透明展開(content-serialize.js line 144),
      對 A anchor 走 paired marker shallow clone — deserialize 後 A 內部結構全丟
      (只剩 Google 翻完純 text)。Layer A3 對齊時:
        - source SPAN.class wrapper(內 prose text)→ extractA3Seq 視為 inline
        - tgt 端因 Google serializer 透明 → 純 text
        - 型別不符 → strict alignment fail → framework-managed fallback dual sibling
          wrapper(違反 §15 single 原地替換)
      v1.9.31 兩塊修法:
        1. Google MT serializer 對「含 element child 的 A」走 atomic 【*N】deep clone:
           A 內部結構(SPAN/text/SPAN/SPAN URL 視覺片段)deserialize 後完整保留。
        2. Layer A3 加 SPAN-unwrap fallback:strict 失敗時 SPAN 全透明展開後對齊,
           anchor / B / I / STRONG 等 semantic inline 維持 opaque。

    模擬真實 X 推文「@stevesi Soma」結構(2026-05-20 Chrome for Claude 真實 dump):
      <div data-testid="tweetText">
        <span class="...">主文 prose</span>
        <a class="..." href="...">
          <span>https://</span>
          某 URL 中段 raw text
          <span>URL 主體</span>
          <span>…</span>
        </a>
        <span class="..."> </span>           ← 空白 spacer(無實質內容,序列化視為透明)
        <div><span><a href="/user/">@mention</a></span></div>
      </div>

    斷言:
      - 此結構走 nodeValue mutate(data-shinkansen-nodevalue-mutated 設上)
      - 不產生 SHINKANSEN-TRANSLATION sibling wrapper(單語覆蓋成立)
      - 主 SPAN text node ref 保留、A.url ref 保留、URL 內 SPAN/text/SPAN/SPAN ref 全保留
      - 主文 text 已替換成譯文
  -->
  <div id="tweet" data-testid="tweetText">
    <span class="text-main">This is a long prose paragraph that simulates a Twitter tweet body with enough characters to look real.</span>
    <!-- URL anchor 模擬真實 X 結構:含 SPAN("https://") + raw text(URL 中段) +
         SPAN(URL 主體) + SPAN("…")四個 children。X 把長 URL 切多段視覺顯示,
         middle 段沒 wrap 在 SPAN(真實 X dump 確認)。 -->
    <a class="url-link" href="https://example.com/article"><span class="url-frag-1">https://</span>example.com/<span class="url-frag-2">article/2026</span><span class="url-frag-3">…</span></a>
    <span class="spacer"> </span>
    <div class="mention-wrap"><span class="mention-inner"><a class="mention-anchor" href="/user/">@someuser</a></span></div>
  </div>
</body>
</html>
