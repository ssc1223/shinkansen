<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>inject-target-locale-styling fixture</title>
  <style>
    /* 模擬 upmedia.mg 類站點:body 寫死繁中 serif 字體 stack 開頭。
       prepend 邏輯應該偵測「serif」風格,選對應 serif locale 字體 stack。 */
    body {
      font-family: "Noto Serif TC", "Microsoft JhengHei", "Heiti TC", serif;
    }
    /* sans-serif 場景:覆寫成 sans-serif 系列 stack */
    #sans-section {
      font-family: "Helvetica Neue", "Microsoft JhengHei", sans-serif;
    }
  </style>
</head>
<body>
  <!--
    Fixture: inject-target-locale-styling
    驗證 single mode 注入時對 el 套 locale-aware 樣式:
      1. lang attribute 設為 STATE.targetLanguage
      2. CJK target(ja / ko / zh-TW / zh-CN)時 prepend LOCALE_FONT_PREPEND[target][style]
         到 inline fontFamily,style 由 detectFontStyle 偵測站點原 stack 得出
      3. 原本就有 inline fontFamily 的 el 會被 prepend 而非取代,原值留作 fallback
      4. restorePage 還原 lang + inline fontFamily(到原值,空字串 = 清掉 inline)
  -->
  <div id="plain">original english plain text</div>
  <p id="with-link">Read the <a href="#">documentation</a> for details</p>
  <div id="with-existing" lang="en">existing english paragraph</div>
  <div id="with-inline" style="font-family: 'Custom Font';">paragraph with inline font</div>
  <div id="sans-section">
    <p id="sans-paragraph">paragraph in sans-serif section</p>
  </div>
</body>
</html>
