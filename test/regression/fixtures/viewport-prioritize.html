<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; padding: 0; }
    article { padding: 16px; }
    .spacer { height: 2000px; background: #eee; }
  </style>
</head>
<body>
  <!--
    v1.9.27 Layer 11(viewport prefetch):prioritizeUnits 同 tier 內 secondary
    sort by 距 viewport 距離。viewport 內優先，viewport 外按近遠 ASC。

    fixture 結構：
      - article#top:viewport 內（默認頁面頂端）
      - spacer:2000px 高，把 article#far 推到 viewport 外
      - article#far:viewport 外（scroll 才看到）

    驗：prioritizeUnits 對這兩個 unit 排序後，top 應在 far 之前（同 tier,
    viewport 距離 ASC）。
  -->
  <main>
    <article id="top">
      <p>Top article paragraph that is in viewport initially.</p>
    </article>
    <div class="spacer"></div>
    <article id="far">
      <p>Far article paragraph that is below viewport initially.</p>
    </article>
  </main>
</body>
</html>
