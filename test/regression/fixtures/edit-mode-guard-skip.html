<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: edit-mode-guard-skip</title>
</head>
<body>
  <!--
    對應 v1.5.5 Content Guard 在編輯模式下不可覆蓋使用者編輯。

    結構通則 (不綁站名):
      使用者翻譯完成後從 popup 按「編輯譯文」進入編輯模式 → content.js 的
      toggleEditMode() 給每個 [data-shinkansen-translated] 元素掛上
      contenteditable="true"。使用者刪/改 innerHTML 是預期行為。

      但 Content Guard 每秒一次 sweep 會比對 STATE.translatedHTML 快取與
      el.innerHTML，發現不符就強制覆蓋——若沒排除 contenteditable 元素，
      使用者每打一個字都會在 1s 內被 guard 蓋回原譯文。

      v1.5.5 修法：runContentGuard 迭代 STATE.translatedHTML 時，若 el
      的 contenteditable === 'true' 就 continue 跳過。

    斷言流程:
      1. testInject 注入譯文 + 填快取
      2. setTestState({ translated: true })
      3. 設 contenteditable="true"（模擬使用者按下編輯按鈕）
      4. 改 innerHTML（模擬使用者編輯）
      5. testRunContentGuard()
      6. restored === 0（guard 應跳過 contenteditable 元素）
      7. innerHTML 仍是使用者的編輯內容、不是原譯文
  -->
  <article>
    <p id="target">The quick brown fox jumps over the lazy dog near the riverbank on a sunny afternoon</p>
  </article>
</body>
</html>
