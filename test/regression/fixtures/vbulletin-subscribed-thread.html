<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>vbulletin-subscribed-thread fixture</title>
</head>
<body>
<!--
  forum.miata.net forumdisplay 頁面:vBulletin 對「使用者已訂閱」的 thread 會多包
  一層無 class 的 <div> wrapper,內含 prefix span、跳到第一筆未讀的圖示連結
  (a#thread_gotonew_X、textLen=0),以及加粗的標題連結 (a#thread_title_X
  style="font-weight:bold")。對照 normal thread:td 直接子是 [A, SPAN]。

  Sanitized 結構:
    <td class="alt1" id="target-subscribed">         ← 訂閱中(沒翻成 bug)
      <div>                                          ← 多一層無 class wrapper
        <span style="float:right">[RF]</span>        ← prefix tag
        <a id="thread_gotonew_X" rel="nofollow"><img></a>  ← textLen=0 圖示連結
        <a id="thread_title_X" style="font-weight:bold">英文標題</a>
      </div>
      <div class="smallfont"><span class="label">作者</span></div>
    </td>

    <td class="alt1" id="target-normal">             ← 一般 thread (有翻成 baseline)
      <a id="thread_title_Y">英文標題</a>
      <span class="label">作者</span>
    </td>

  acceptNode 對 td#target-subscribed 走訪:
    - TD 在 BLOCK_TAGS_SET、無 BLOCK 後代(div/span/a 都不在)
    - containsBlockDescendant=false → 不走 fragment 路徑
    - isCandidateText=true、無 img → 不走 mediaCardSkip
    - 進入 v1.4.17 block-with-container 分支 (line 412):
        containerKids = [DIV, DIV.smallfont]
          DIV.children = [SPAN, A#thread_gotonew (textLen=0,
            isCandidateText fail), A#thread_title (textLen=28, 應通過)]
          DIV.smallfont.children = [SPAN] (不是 A,跳過)
    - 預期:capturedLinks >= 1 → A#thread_title 進 results
    - 但真實頁面實測沒翻成 → 此 fixture 用來定位是哪步失敗
-->
<table><tbody>
<tr>
  <td class="alt1" id="target-subscribed">
    <div>
      <span style="float:right">[RF]</span>
      <a href="#" id="thread_gotonew_799932" rel="nofollow"><img alt="Go to first new post" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="></a>
      <a href="#" id="thread_title_799932" style="font-weight:bold">Improved RF Drain Access Mod</a>
    </div>
    <div class="smallfont">
      <span class="label">Montillius</span>
    </div>
  </td>
</tr>
<tr>
  <td class="alt1" id="target-normal">
    <a href="#" id="thread_title_789544">RF Wind Deflector</a>
    <span class="label">krutsch</span>
  </td>
</tr>
</tbody></table>
</body>
</html>
